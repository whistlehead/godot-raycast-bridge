name: Build RaycastBridge

# Supported Godot versions — update this matrix when a new godot-cpp stable branch is
# released. Use the branch name as it appears at github.com/godotengine/godot-cpp/branches.
# Current naming convention: bare version numbers (4.3, 4.4, 4.5).
# If godot-cpp adopts a new branch naming scheme in future (e.g. godot-4.6-stable),
# update the matrix values and the clone --branch flag accordingly.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Windows x86-64 ──────────────────────────────────────────────────────────
  build-windows-x86_64:
    name: Windows x86-64 (Godot ${{ matrix.godot_version }})
    runs-on: windows-latest
    strategy:
      matrix:
        godot_version: ["4.3", "4.4", "4.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Cache godot-cpp
        uses: actions/cache@v4
        id: cache-godotcpp
        with:
          path: godot-cpp/${{ matrix.godot_version }}
          key: godotcpp-${{ matrix.godot_version }}-windows-x86_64

      - name: Clone godot-cpp
        if: steps.cache-godotcpp.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/godotengine/godot-cpp `
            --branch ${{ matrix.godot_version }} `
            --depth 1 `
            --recurse-submodules `
            godot-cpp/${{ matrix.godot_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install scons

      - name: Build (debug)
        run: scons target=template_debug platform=windows arch=x86_64 godot_version=${{ matrix.godot_version }}

      - name: Build (release)
        run: scons target=template_release platform=windows arch=x86_64 godot_version=${{ matrix.godot_version }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.godot_version }}-windows-x86_64
          path: bin/RaycastBridge.windows.*x86_64*

  # ── Windows ARM64 ───────────────────────────────────────────────────────────
  build-windows-arm64:
    name: Windows ARM64 (Godot ${{ matrix.godot_version }})
    runs-on: windows-latest
    strategy:
      matrix:
        godot_version: ["4.3", "4.4", "4.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Cache godot-cpp
        uses: actions/cache@v4
        id: cache-godotcpp
        with:
          path: godot-cpp/${{ matrix.godot_version }}
          key: godotcpp-${{ matrix.godot_version }}-windows-arm64

      - name: Clone godot-cpp
        if: steps.cache-godotcpp.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/godotengine/godot-cpp `
            --branch ${{ matrix.godot_version }} `
            --depth 1 `
            --recurse-submodules `
            godot-cpp/${{ matrix.godot_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install scons

      - name: Build (debug)
        run: scons target=template_debug platform=windows arch=arm64 godot_version=${{ matrix.godot_version }}

      - name: Build (release)
        run: scons target=template_release platform=windows arch=arm64 godot_version=${{ matrix.godot_version }}

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.godot_version }}-windows-arm64
          path: bin/RaycastBridge.windows.*arm64*

  # ── macOS Universal ─────────────────────────────────────────────────────────
  build-macos:
    name: macOS Universal (Godot ${{ matrix.godot_version }})
    runs-on: macos-latest
    strategy:
      matrix:
        godot_version: ["4.3", "4.4", "4.5"]
    steps:
      - uses: actions/checkout@v4

      - name: Cache godot-cpp
        uses: actions/cache@v4
        id: cache-godotcpp
        with:
          path: godot-cpp/${{ matrix.godot_version }}
          key: godotcpp-${{ matrix.godot_version }}-macos

      - name: Clone godot-cpp
        if: steps.cache-godotcpp.outputs.cache-hit != 'true'
        run: |
          git clone https://github.com/godotengine/godot-cpp \
            --branch ${{ matrix.godot_version }} \
            --depth 1 \
            --recurse-submodules \
            godot-cpp/${{ matrix.godot_version }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - run: pip install scons

      - name: Build x86-64 (debug)
        run: scons target=template_debug platform=macos arch=x86_64 godot_version=${{ matrix.godot_version }}

      - name: Build x86-64 (release)
        run: scons target=template_release platform=macos arch=x86_64 godot_version=${{ matrix.godot_version }}

      - name: Build arm64 (debug)
        run: scons target=template_debug platform=macos arch=arm64 godot_version=${{ matrix.godot_version }}

      - name: Build arm64 (release)
        run: scons target=template_release platform=macos arch=arm64 godot_version=${{ matrix.godot_version }}

      - name: Lipo — merge into universal binaries
        run: |
          for target in template_debug template_release; do
            lipo -create \
              bin/RaycastBridge.macos.${target}.x86_64.dylib \
              bin/RaycastBridge.macos.${target}.arm64.dylib \
              -output bin/RaycastBridge.macos.${target}.universal.dylib
          done

      - name: Ad-hoc sign dylibs (satisfies Gatekeeper without a paid certificate)
        run: |
          for f in bin/RaycastBridge.macos.*.dylib; do
            codesign --force --sign - "$f"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.godot_version }}-macos
          path: bin/RaycastBridge.macos.*

  # ── Publish a GitHub Release when a version tag is pushed ───────────────────
  release:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows-x86_64, build-windows-arm64, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        godot_version: ["4.3", "4.4", "4.5"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: bin-${{ matrix.godot_version }}-*
          merge-multiple: true
          path: bin/

      - name: Zip release
        run: zip -r RaycastBridge-${{ github.ref_name }}-godot${{ matrix.godot_version }}.zip bin/ RaycastBridge.gdextension

      - uses: softprops/action-gh-release@v2
        with:
          files: RaycastBridge-${{ github.ref_name }}-godot${{ matrix.godot_version }}.zip
          generate_release_notes: true
